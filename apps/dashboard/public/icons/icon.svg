<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-label="Quotation System">
  <!-- Background circle -->
  <rect width="512" height="512" rx="108" fill="#2490ef"/>
  
  <!-- Reindeer body -->
  <ellipse cx="256" cy="310" rx="90" ry="60" fill="#8B4513"/>
  
  <!-- Reindeer head -->
  <ellipse cx="256" cy="210" rx="55" ry="50" fill="#A0522D"/>
  
  <!-- Reindeer snout -->
  <ellipse cx="256" cy="240" rx="28" ry="18" fill="#D2691E"/>
  
  <!-- Reindeer nose -->
  <circle cx="256" cy="245" r="8" fill="#CC0000"/>
  
  <!-- Reindeer eyes -->
  <circle cx="235" cy="200" r="8" fill="white"/>
  <circle cx="277" cy="200" r="8" fill="white"/>
  <circle cx="237" cy="200" r="4" fill="#1a1a1a"/>
  <circle cx="279" cy="200" r="4" fill="#1a1a1a"/>
  
  <!-- Reindeer ears -->
  <ellipse cx="210" cy="180" rx="15" ry="25" fill="#A0522D" transform="rotate(-20, 210, 180)"/>
  <ellipse cx="302" cy="180" rx="15" ry="25" fill="#A0522D" transform="rotate(20, 302, 180)"/>
  
  <!-- Reindeer antlers -->
  <path d="M220 170 Q200 120 180 100 Q170 90 160 100" stroke="#8B4513" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M200 120 Q190 110 185 95" stroke="#8B4513" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M292 170 Q312 120 332 100 Q342 90 352 100" stroke="#8B4513" stroke-width="8" fill="none" stroke-linecap="round"/>
  <path d="M312 120 Q322 110 327 95" stroke="#8B4513" stroke-width="6" fill="none" stroke-linecap="round"/>
  
  <!-- Reindeer legs -->
  <rect x="195" y="350" width="18" height="55" rx="6" fill="#8B4513"/>
  <rect x="225" y="350" width="18" height="55" rx="6" fill="#8B4513"/>
  <rect x="275" y="350" width="18" height="55" rx="6" fill="#8B4513"/>
  <rect x="305" y="350" width="18" height="55" rx="6" fill="#8B4513"/>
  
  <!-- Reindeer hooves -->
  <rect x="193" y="395" width="22" height="10" rx="4" fill="#5C3317"/>
  <rect x="223" y="395" width="22" height="10" rx="4" fill="#5C3317"/>
  <rect x="273" y="395" width="22" height="10" rx="4" fill="#5C3317"/>
  <rect x="303" y="395" width="22" height="10" rx="4" fill="#5C3317"/>
  
  <!-- Reindeer tail -->
  <circle cx="345" cy="300" r="12" fill="#D2691E"/>
  
  <!-- Smile -->
  <path d="M242 255 Q256 268 270 255" stroke="#5C3317" stroke-width="3" fill="none" stroke-linecap="round"/>
</svg>
