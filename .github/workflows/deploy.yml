name: Build & Deploy

on:
  push:
    branches: [master, main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  DASHBOARD_IMAGE: ghcr.io/${{ github.repository }}/dashboard
  TELEGRAM_BOT_IMAGE: ghcr.io/${{ github.repository }}/telegram-bot

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # --- Build & Push API ---
      - name: Build & Push API
        uses: docker/build-push-action@v5
        with:
          context: ./apps/api
          push: true
          tags: |
            ${{ env.API_IMAGE }}:${{ github.sha }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # --- Build & Push Dashboard ---
      - name: Build & Push Dashboard
        uses: docker/build-push-action@v5
        with:
          context: ./apps/dashboard
          push: true
          tags: |
            ${{ env.DASHBOARD_IMAGE }}:${{ github.sha }}
            ${{ env.DASHBOARD_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NEXT_PUBLIC_API_URL=/api

      # --- Build & Push Telegram Bot ---
      - name: Build & Push Telegram Bot
        uses: docker/build-push-action@v5
        with:
          context: ./apps/telegram-bot
          push: true
          tags: |
            ${{ env.TELEGRAM_BOT_IMAGE }}:${{ github.sha }}
            ${{ env.TELEGRAM_BOT_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Connect to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci
          ping: 100.86.182.7

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' '${{ secrets.VPS_SSH_KEY }}' > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

      - name: Deploy to VPS via Tailscale
        run: |
          ssh -o StrictHostKeyChecking=accept-new -i ~/.ssh/id_ed25519 ${{ secrets.VPS_USER }}@100.86.182.7 "
            set -e
            cd /opt/quotation-automation

            # Pull latest images from GHCR
            docker pull ${{ env.API_IMAGE }}:latest
            docker pull ${{ env.DASHBOARD_IMAGE }}:latest
            docker pull ${{ env.TELEGRAM_BOT_IMAGE }}:latest

            # Sync docker-compose image cache with freshly pulled images
            docker-compose pull api dashboard telegram-bot

            # Restart containers with new images
            docker-compose up -d --no-deps --remove-orphans api dashboard telegram-bot

            # Clean up old dangling images
            docker image prune -f

            echo 'Deployment complete!'
          "
