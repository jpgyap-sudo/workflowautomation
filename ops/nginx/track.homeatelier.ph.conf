# Enable gzip compression
gzip on;
gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;
gzip_min_length 256;
gzip_comp_level 5;
gzip_vary on;
gzip_proxied any;

# Cache static assets for 1 year
map $sent_http_content_type $expires {
    default                    off;
    ~image/                    365d;
    ~font/                     365d;
    ~application/javascript    365d;
    ~text/css                  365d;
    ~application/json           5s;
}

# Upstream keepalive for better connection reuse
upstream dashboard {
    server 127.0.0.1:3001;
    keepalive 32;
}

upstream api {
    server 127.0.0.1:8080;
    keepalive 32;
}

# NOTE: this VPS is shared — port 443 is bound by the xray container (VPN/proxy
# service), not nginx. This site's HTTPS listens on 9443 instead; whatever fronts
# public :443 (xray fallback/SNI routing) forwards track.homeatelier.ph traffic here.
# Do not change these back to 443 without confirming the xray setup on this host.

# Catch-all default server — returns 444 (close connection) for unknown hostnames
# Prevents 503 errors and unwanted traffic from hitting this server
server {
    listen 80 default_server;
    listen 9443 ssl default_server;
    ssl_certificate /etc/letsencrypt/live/track.homeatelier.ph/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/track.homeatelier.ph/privkey.pem;
    return 444;
}

server {
    server_name track.homeatelier.ph;

    # Allow file uploads up to 10MB (matching API bodyLimit)
    client_max_body_size 10m;

    # Security headers — including HSTS to force HTTPS and prevent downgrade attacks
    add_header X-Content-Type-Options nosniff;
    add_header X-Frame-Options SAMEORIGIN;
    add_header X-XSS-Protection "1; mode=block";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

    # API proxy — no caching for dynamic API
    location /api/ {
        proxy_pass http://api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        add_header Cache-Control "no-store, no-cache, must-revalidate";

        # SSE support — don't buffer event stream
        location /api/events {
            proxy_pass http://api/events;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_buffering off;
            proxy_cache off;
            chunked_transfer_encoding on;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }
    }

    # Next.js static assets — aggressive caching
    location /_next/static/ {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    # Everything else — proxy to Next.js
    location / {
        proxy_pass http://dashboard;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        expires $expires;
    }

    listen 9443 ssl; # managed by Certbot — port 443 is reserved for xray on this host
    ssl_certificate /etc/letsencrypt/live/track.homeatelier.ph/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/track.homeatelier.ph/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP → HTTPS redirect for track.homeatelier.ph
server {
    server_name track.homeatelier.ph;
    listen 80;
    return 301 https://$host$request_uri;
}
